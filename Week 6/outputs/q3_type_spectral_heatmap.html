  <title>Q3 support: Which type-spectral combinations are common?</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
      --accent: #3b82f6;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 40px;
      background: radial-gradient(circle at 10% 10%, #edf4ff 0%, #f5f8ff 35%, var(--bg) 70%);
      font-family: Helvetica, Arial, sans-serif;
      color: var(--ink);
    }
    .card {
      max-width: 1700px;
      width: 98vw;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow: 0 30px 70px rgba(15, 23, 42, 0.14);
      padding: 42px 42px 34px;
    }
    .top {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }
    .pill {
      display: inline-block;
      width: fit-content;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eef2ff;
      color: #1e40af;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .q {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
      font-weight: 800;
    }
    .meta {
      margin: 0;
      font-size: 15px;
      line-height: 1.55;
      color: var(--muted);
    }
    .meta b { color: var(--ink); }
    .plot-wrap {
      margin-top: 18px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #fff;
      padding: 22px;
    }
  </style>
