name: Deploy BatchForge

on:
  push:
    branches: [main]
    paths:
      - 'MP2/batchforge/**'
      - '.github/workflows/deploy-batchforge.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-batchforge
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: MP2/batchforge/package-lock.json

      - name: Install and build
        working-directory: MP2/batchforge
        run: |
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: MP2/batchforge/dist
          destination_dir: batchforge
